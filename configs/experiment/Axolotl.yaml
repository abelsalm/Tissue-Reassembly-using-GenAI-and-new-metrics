# @package _global_
general:
    name : 'Axolotl'
    mode : 'train_and_test'

distribute:
    gpus_per_node: 1  # 1 = auto-detect one device (works on CPU-only machines)

dataset:
    dataset_name: 'Axolotl'
    gene_columns_start: 5   # first column after the index is a gene
    gene_columns_end: -1 
    train_data_path: "/data-master/biodata/Axolotl/train_cells_expression.csv"
    test_data_path: "/data-master/biodata/Axolotl/test_cells_expression.csv"
    validation_data_path: ""
    maximum_graph_size:
        train:  3000   # downsample graphs to fit in CPU RAM; set null for full graphs on GPU
        test: 3000
        validation: null

train: # !!!!
    n_epochs: 3000        # tiny number for a smoke-test; increase for real training
    batch_size: 2      # keep small on CPU
    lr: 5e-4

test:
    save_dir: '/data-master/code/outputs'
    checkpoints_parent_dir: null #"/data-master/code/outputs/2026-05-04/10-54-06-MERFISH_small_cortex/checkpoints"
    checkpoints_name_list: all

validation: # !!!!
    if_validate: False
    save_model_every_n_epochs: 250  # save every epoch during the smoke-test