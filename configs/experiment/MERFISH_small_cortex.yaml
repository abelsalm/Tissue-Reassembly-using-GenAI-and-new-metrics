# @package _global_
general:
    name : 'MERFISH_small_cortex'
    mode : 'train_and_test'

distribute:
    gpus_per_node: 1  # 1 = auto-detect one device (works on CPU-only machines)

dataset:
    dataset_name: 'MERFISH_small_cortex'
    gene_columns_start: 0   # first column after the index is a gene
    gene_columns_end: 254    #
    train_data_path: "/data-master/biodata/MERFISH_LUNA_small_cortex/MERFISH_mouse_cortex_train.csv"
    test_data_path: "/data-master/biodata/MERFISH_LUNA_small_cortex/MERFISH_mouse_cortex_test.csv"
    validation_data_path: ""
    maximum_graph_size:
        train:  null   # downsample graphs to fit in CPU RAM; set null for full graphs on GPU
        test: null
        validation: null

train: # !!!!
    n_epochs: 100        # tiny number for a smoke-test; increase for real training
    batch_size: 1      # keep small on CPU
    lr: 5e-4

test:
    save_dir: '/data-master/code/outputs'
    checkpoints_parent_dir: null
    checkpoints_name_list: all

validation: # !!!!
    if_validate: False
    save_model_every_n_epochs: 250  # save every epoch during the smoke-test