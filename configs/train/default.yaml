
n_epochs: 1000 # Number of epochs
batch_size: 1 # Batch size for training
lr: 5e-4 # Learning rate
fast_dev_run: False # If True, runs 1 batch of train, test and val to find any bugs
weight_decay: 1.0e-12
rechunk_every_n_epochs: 10 # Re-randomise chunk boundaries every N epochs (0 = disabled)
debug_print_shuffle_every_n_epochs: 100 # Print a shuffle canary every N epochs (0 = disabled)
debug_shuffle_row_index: 10 # Fixed row index to print after shuffle (0-based)
loss_type: "combined" # "combined" or "position_mse"
mse_weight: 1.0
ch_final_weight: 0.02
ch_warmup_fraction: 0.5
ch_ramp_every_n_epochs: 100
ch_radii: [0.001, 0.002, 0.003, 0.004, 0.005, 0.006, 0.007, 0.008, 0.009, 0.01]
ch_grid_resolution: 256
ch_kappa: 0.5
ch_soft_max_beta: 32.0
ch_support_factor: 64.0
ch_square_bbox: True
ch_margin: 0.01
ch_eps: 1e-6
ch_min_cells_per_type: 10
